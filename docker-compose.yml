version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: hireai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  genai:
    build: .
    container_name: hireai-genai
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://host.docker.internal:11434/v1
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data

volumes:
  redis_data:
